        container.innerHTML = "";

        const sections = [
            { id: "fase1", title: "🌅 FASE 1 — FONDASI PAGI & RUTINITAS HARIAN", sub: "Langkah 1–20 | Bangun pagi · To-do list · Pomodoro · Meditasi · Tidur berkualitas", data: productivityData.fase1, icon: "ti ti-sun-high" },
            { id: "fase2", title: "⚙️ FASE 2 — OPTIMASI KERJA & LINGKUNGAN", sub: "Langkah 21–40 | GTD · Time blocking · Journaling · Digital detox · Networking", data: productivityData.fase2, icon: "ti ti-settings" },
            { id: "fase3", title: "🎯 FASE 3 — TEKNIK LANJUTAN & STRATEGI FOKUS", sub: "Langkah 41–60 | Deep work · Eisenhower Matrix · Eat the frog · Vision board", data: productivityData.fase3, icon: "ti ti-crosshair" },
            { id: "fase4", title: "🔄 FASE 4 — KONSISTENSI & SISTEM BERKELANJUTAN", sub: "Langkah 61–80 | Pareto · Kanban · Don't break the chain · Accountability partner", data: productivityData.fase4, icon: "ti ti-infinity" },
            { id: "fase5", title: "🏆 FASE 5 — MASTERY & PERBAIKAN BERKELANJUTAN", sub: "Langkah 81–100 | Habit stacking · 1% rule · Deliberate practice · Ivy Lee method", data: productivityData.fase5, icon: "ti ti-trophy" }
        ];

        sections.forEach(section => {
            const sectionDiv = document.createElement("div");
            sectionDiv.className = "section-card";
            sectionDiv.innerHTML = `
                <div class="section-header">
                    <i class="${section.icon}"></i>
                    <h2>${section.title}</h2>
                    <div class="sub">${section.sub}</div>
                </div>
                <div class="grid-activities" id="grid-${section.id}"></div>
            `;
            container.appendChild(sectionDiv);
            const grid = document.getElementById(`grid-${section.id}`);
            
            section.data.forEach(activityText => {
                const match = activityText.match(/^(\d+)\.\s+(.*)/);
                const stepNumber = match ? parseInt(match[1]) : 0;
                const fullSentence = match ? match[2] : activityText;
                const iconClass = getIconForStep(stepNumber);
                
                const card = document.createElement("div");
                card.className = "activity-card";
                card.innerHTML = `
                    <div class="card-icon">
                        <i class="${iconClass}"></i>
                    </div>
                    <div class="card-content">
                        <div class="act-number">
                            <i class="ti ti-check"></i>
                            ${stepNumber}
                        </div>
                        <div class="act-title">${escapeHtml(fullSentence)}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    renderAllActivities();

    // ========== GSAP + SCROLL TRIGGER ==========
    gsap.registerPlugin(ScrollTrigger);
    const scrollPanel = document.getElementById("productivityScrollPanel");
    
    const sectionsDom = gsap.utils.toArray(".section-card");
    sectionsDom.forEach((sec, idx) => {
        gsap.from(sec, {
            scrollTrigger: {
                trigger: sec,
                scroller: scrollPanel,
                start: "top 85%",
                end: "bottom 60%",
                toggleActions: "play none none reverse",
                once: false
            },
            opacity: 0,
            y: 35,
            duration: 0.6,
            delay: idx * 0.05,
            ease: "power2.out"
        });
    });

    const allCards = gsap.utils.toArray(".activity-card");
    allCards.forEach((card, idx) => {
        gsap.from(card, {
            scrollTrigger: {
                trigger: card,
                scroller: scrollPanel,
                start: "top 93%",
                toggleActions: "play none none none",
                once: true
            },
            opacity: 0,
            x: -10,
            duration: 0.35,
            delay: (idx % 15) * 0.008,
            ease: "back.out(0.7)"
        });
    });

    document.body.style.overflow = 'hidden';
</script>
</body>
</html>
